    #flashMsg{font-size:11px;font-family:monospace;color:#00FFB2}

    .sc{border-radius:10px;padding:8px 6px;cursor:pointer;text-align:left;color:#e2eaf5;width:100%;border:none;-webkit-appearance:none;position:relative}
    .stk{font-size:8px;font-family:monospace;margin-bottom:2px;white-space:nowrap;overflow:hidden}
    .snm{font-size:11px;font-weight:700;margin-bottom:2px}
    .sprc{font-size:13px;font-weight:700;font-family:monospace}
    .scur{font-size:8px;font-family:monospace;opacity:.6;margin-top:1px}
    .schg{font-size:9px;margin-top:2px;font-weight:700}

    .pmain{font-size:38px;font-weight:700;font-family:monospace;line-height:1}
    .pcur{font-size:13px;color:#3a5070;margin-top:3px;font-family:monospace}

    .pday{font-size:16px;font-weight:700}
    .pytd{font-size:13px;margin-top:4px}
    .ptgt{font-size:12px;color:#4a6080;margin-top:6px}
    .prat{font-size:12px;color:#00FFB2;margin-top:2px}

    .tabrow button.on{font-weight:700;color:#050a14}
    /* range buttons */
    .rngrow{display:flex;gap:4px}
    .rngrow button{border-radius:6px;border:1px solid #1E3A52;padding:4px 10px;cursor:pointer;font-size:13px;font-family:'PingFang TC',sans-serif;color:#A8C0D8;background:#0d1525}
    .rngrow button.on{font-weight:700;color:#050a14}

    .plbl{font-size:10px;color:#4a6080;margin-bottom:8px;font-family:monospace;line-height:1.6}
    .mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .mc{background:#0d1525;border-radius:8px;padding:9px 11px}
    .ml{font-size:10px;color:#4a6080;margin-bottom:3px}
    .mv{font-size:13px;color:#8899aa;font-weight:700;font-family:monospace}

var AS="vusion", TAB="chart", RANGE="年", CHART=null;
var LIVE={}, UDATE="2026/03/06", IS_LIVE=false;

// ════════════════════════════════════════════════

function pct(a,b){return b?(((a-b)/b)*100).toFixed(2):"0.00";}
function uc(v){return parseFloat(v)>=0?"#00FFB2":"#FF4444";}
function sign(v){return parseFloat(v)>=0?"+":" ";}

function setStatus(s,lbl){
  var colors={live:"#00FFB2",loading:"#FFB300",static:"#7A9AB8"};
  var c=colors[s]||colors.static;
  document.getElementById("sdot").style.background=c;
  document.getElementById("slabel").style.color=c;
  document.getElementById("slabel").textContent=lbl||s;
  document.getElementById("sbadge").style.background=c+"18";
  var btn=document.getElementById("refreshBtn");
  if(s==="loading") btn.classList.add("spin"); else btn.classList.remove("spin");
}
function flash(m){
  var el=document.getElementById("flashMsg");
  el.textContent=m;
  setTimeout(function(){el.textContent="";},3000);
}

// ════════════════════════════════════════════════
// Yahoo Finance 即時抓取（CORS proxy 輪流嘗試）
// ════════════════════════════════════════════════
var TICKERS={
  vusion:"VU.PA",
  solum:"248070.KS",
  eink:"8069.TWO",
  pricer:"PRIC-B.ST"
};

// 多個 proxy 輪流，第一個成功就停
var PROXIES=[
  function(url){return "https://corsproxy.io/?"+encodeURIComponent(url);},
  function(url){return "https://api.allorigins.win/raw?url="+encodeURIComponent(url);},
  function(url){return "https://thingproxy.freeboard.io/fetch/"+url;}
];

function yahooUrl(ticker){
  return "https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(ticker)+"?interval=1d&range=5d";
}

// 用 proxy 試抓一支股票，回傳 {current, prev, h52, l52}
function fetchOneWithProxy(ticker, proxyIdx){
  if(proxyIdx>=PROXIES.length) return Promise.reject(new Error("all proxies failed"));
  var url=PROXIES[proxyIdx](yahooUrl(ticker));
  return fetch(url,{signal:AbortSignal.timeout(8000)})
    .then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    })
    .then(function(d){
      var res=d&&d.chart&&d.chart.result&&d.chart.result[0];
      var meta=res&&res.meta;
      if(!meta||!meta.regularMarketPrice) throw new Error("no price");
      return {
        current: Math.round(meta.regularMarketPrice*10000)/10000,
        prev:    Math.round((meta.previousClose||meta.chartPreviousClose||meta.regularMarketPrice)*10000)/10000,
        h52:     meta.fiftyTwoWeekHigh||null,
        l52:     meta.fiftyTwoWeekLow||null,
      };
    })
    .catch(function(){
      // 下一個 proxy
      return fetchOneWithProxy(ticker, proxyIdx+1);
    });
}

function doRefresh(){
  setStatus("loading","即時抓取中");
  var now=new Date();
  var dateStr=(now.getFullYear())+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+String(now.getDate()).padStart(2,"0");
  var timeStr=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");

  // 並行抓 4 支上市股票
  var ids=["vusion","solum","eink","pricer"];
  var promises=ids.map(function(id){
    return fetchOneWithProxy(TICKERS[id],0)
      .then(function(d){return {id:id,d:d};})
      .catch(function(){return {id:id,d:null};});
  });

  Promise.all(promises).then(function(results){
    var anyLive=false;
    results.forEach(function(r){
      if(!r.d) return;
      anyLive=true;
      LIVE[r.id]=r.d;
      // 更新歷史最後一筆為盤中即時價
      if(HIST[r.id]&&HIST[r.id].length>0){
        HIST[r.id][HIST[r.id].length-1].p=r.d.current;
        HIST[r.id][HIST[r.id].length-1].d=dateStr;
      }
    });

    if(anyLive){
      UDATE=dateStr+" "+timeStr;
      IS_LIVE=true;
      setStatus("live",dateStr+" "+timeStr);
      flash("✓ 即時 "+timeStr);
      document.getElementById("footer").textContent="盤中即時 "+dateStr+" "+timeStr+" · 非投資建議";
    } else {
      // Yahoo 全失敗，改抓 prices.json 當備援
      fallbackPricesJson();
      return;
    }
    render();
  });
}

function fallbackPricesJson(){
  fetch("./prices.json?t="+Date.now())
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(j){
      ["vusion","solum","eink","pricer"].forEach(function(id){
        var d=j[id];
        if(d&&d.current!=null){
          LIVE[id]=d;
          if(HIST[id]&&HIST[id].length>0){
            HIST[id][HIST[id].length-1].p=d.current;
            HIST[id][HIST[id].length-1].d=j.updated||UDATE;
          }
        }
      });
      UDATE=j.updated||UDATE;
      IS_LIVE=true;
      setStatus("live",UDATE);
      flash("✓ prices.json "+UDATE);
      document.getElementById("footer").textContent="收盤 "+UDATE+" · GitHub esl-prices · 非投資建議";
      render();
    })
    .catch(function(){
      setStatus("static","靜態後備");
      flash("⚠ 使用靜態收盤");
      render();
    });
}

// 圖表資料過濾（日/週/月/季/年）
// ════════════════════════════════════════════════
function getChartData(id,range){
  var all=HIST[id]||[];
  if(!all.length) return [];
  var now=new Date(2026,2,11); // 今天
  var cutMs={"日":60*864e5,"週":120*864e5,"月":183*864e5,"季":366*864e5,"年":4*366*864e5}[range]||4*366*864e5;
  var filtered=all.filter(function(r){
    var p=r.d.split("/");
    var yr=parseInt(p[2])<100?2000+parseInt(p[2]):parseInt(p[2]);
    var dt=new Date(yr,parseInt(p[0])-1,parseInt(p[1]));
    var diff=now-dt;
    return diff>=0&&diff<=cutMs;
  });
  var step=range==="日"?1:range==="週"?1:range==="月"?2:range==="季"?2:3;
  return filtered.filter(function(_,i){return i%step===0;}).map(function(r){return{date:r.d,price:r.p};});
}

function renderChart(){
  var st=STOCKS.find(function(x){return x.id===AS;});
  var C=st.c;
  var h=h52(AS),l=l52(AS),tg=tgt(AS),b=BASE[AS];
  var chartData=getChartData(AS,RANGE);

  var rngBtns=['日','週','月','季','年'].map(function(r){
    return '<button class="'+(RANGE===r?'on':'')+'" style="'+(RANGE===r?'background:'+C+';color:#050a14;border-color:'+C+';':'')
      +'" onclick="setRange(\''+r+'\')">'+r+'</button>';
  }).join('');

  var subLbl={"日":"近60天 · 每日收盤","週":"近4個月 · 每週","月":"近6個月 · 雙週","季":"近1年 · 月收盤","年":"2023–2026 · 全歷史"}[RANGE];
  if(AS==="m2comm") subLbl="未上市 · 無收盤數據";

  document.getElementById("tchart").innerHTML=
    '<div class="panel">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
        +'<div style="font-size:11px;color:#A8C0D8;font-family:monospace">年高: '+(h?h.toLocaleString():'N/A')+' · 年低: '+(l?l.toLocaleString():'N/A')+'</div>'
        +'<div class="rngrow">'+rngBtns+'</div>'
      +'</div>'
      +'<div class="plbl">'+subLbl+' · 資料來源：Yahoo Finance / Investing.com</div>'
      +(AS==="m2comm"
        ?'<div style="text-align:center;padding:50px 0;color:#7A9AB8;font-size:13px">未上市公司 · 無公開收盤數據</div>'
        :'<canvas id="myChart"></canvas>'
      )
      +'<div style="display:flex;gap:16px;margin-top:8px;font-size:12px">'
        +'<span style="color:#FF4444">— 52週高點</span>'
        +'<span style="color:#00FFB2">— 52週低點</span>'
      +'</div>'
      +'<div class="mg">'
        +'<div class="mc"><div class="ml">52週高點</div><div class="mv">'+(h?h.toLocaleString():'N/A')+'</div></div>'
        +'<div class="mc"><div class="ml">52週低點</div><div class="mv">'+(l?l.toLocaleString():'N/A')+'</div></div>'
        +'<div class="mc"><div class="ml">市值</div><div class="mv">'+b.mc+'</div></div>'
        +'<div class="mc"><div class="ml">目標價</div><div class="mv">'+(tg?st.cur+' '+tg.toLocaleString():'無')+'</div></div>'
      +'</div>'
    +'</div>';

  if(AS!=="m2comm"&&chartData.length>0){
    if(CHART){CHART.destroy();CHART=null;}
    var ctx=document.getElementById("myChart").getContext("2d");
    CHART=new Chart(ctx,{
      type:"line",
      data:{
        labels:chartData.map(function(d){return d.date;}),
        datasets:[{
          data:chartData.map(function(d){return d.price;}),
          borderColor:C,borderWidth:2.5,pointRadius:0,tension:0.3,fill:false
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:true,animation:{duration:300},
        plugins:{
          legend:{display:false},
          tooltip:{
            mode:"nearest",intersect:false,
            backgroundColor:"#0a0f1e",borderColor:"#1e2d4a",borderWidth:1,titleColor:"#8899aa",
            callbacks:{label:function(ctx){return st.cur+" "+ctx.parsed.y.toLocaleString();}}
          }
        },
        scales:{
          x:{grid:{color:"#0d1e32"},ticks:{color:"#3a5070",font:{size:9},maxTicksLimit:8}},
          y:{grid:{color:"#0d1e32"},ticks:{color:"#3a5070",font:{size:10},callback:function(v){return v.toLocaleString();}},width:80}
        }
      },
      plugins:[{id:"rl",afterDraw:function(ch){
        if(!h&&!l)return;
        var c=ch.ctx,x=ch.scales.x,y=ch.scales.y;
        [[h,"#FF4444"],[l,"#00FFB2"]].forEach(function(pair){
          if(!pair[0])return;
          var yp=y.getPixelForValue(pair[0]);
          c.save();c.setLineDash([4,4]);c.strokeStyle=pair[1];c.lineWidth=1;
          c.beginPath();c.moveTo(x.left,yp);c.lineTo(x.right,yp);c.stroke();c.restore();
        });
      }}]
    });
  }
}

function showNewsRpt(){
  var st=STOCKS.find(function(x){return x.id===AS;});
  var C=st.c;

  // 先顯示載入中
  document.getElementById("rpanel").innerHTML=
    '<div style="text-align:center;padding-top:50px">'
      +'<div class="ldots"><div class="ldot" style="background:'+C+'"></div><div class="ldot" style="background:'+C+'"></div><div class="ldot" style="background:'+C+'"></div></div>'
      +'<div style="margin-top:14px;font-size:14px;color:'+C+'">搜尋最新新聞中⋯</div>'
      +'<div style="margin-top:6px;font-size:11px;color:#3a5070">Claude web search · 約 15–20 秒</div>'
    +'</div>';

  var today=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"});
  var prompt="今天是 "+today+"。請搜尋 "+st.name+"（"+st.ticker+"）最近 2 週內的重大新聞、法說會、財報、訂單、合作、專利等事件。\n\n"
    +"請用繁體中文，以純文字格式回覆，格式如下：\n\n"
    +"📰 最新重大事件（列出 3–5 條，每條格式：▸ 日期 標題：一句話摘要）\n\n"
    +"🔬 近期專利或技術動向（1–2 條）\n\n"
    +"⚠️ 近期風險或注意事項（1 條）\n\n"
    +"字數控制在 350 字內，純文字不要 markdown。";

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      tools:[{"type":"web_search_20250305","name":"web_search"}],
      messages:[{role:"user",content:prompt}]
    })
  })
  .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(function(j){
    // 取出所有 text block（web_search 回應會有多個 block）
    var txt=(j.content||[])
      .filter(function(b){return b.type==="text";})
      .map(function(b){return b.text;})
      .join("\n").trim();
    if(!txt) throw new Error("no content");
    document.getElementById("rpanel").innerHTML=
      '<div class="rhead"><div><span class="rsn" style="color:'+C+'">'+st.name+'</span><span class="rss">即時新聞 · '+today+'</span></div><button class="cbtn" onclick="renderReport()">✕</button></div>'
      +'<div class="rbody">'+txt+'</div>'
      +'<div class="rftr">資料：Claude web search '+today+' · 以上內容僅供參考，不構成投資建議</div>';
  })
  .catch(function(err){
    // API 失敗，fallback 到靜態新聞
    document.getElementById("rpanel").innerHTML=
      '<div class="rhead"><div><span class="rsn" style="color:'+C+'">'+st.name+'</span><span class="rss">靜態新聞（API 失敗）</span></div><button class="cbtn" onclick="renderReport()">✕</button></div>'
      +'<div class="rbody">⚠️ 即時搜尋失敗（'+( err.message||"網路錯誤")+'），顯示靜態資料：\n\n'+LATEST_NEWS[AS]+'</div>'
      +'<div class="rftr">以上內容僅供參考，不構成投資建議</div>';
  });
}

function runAI(){
  var st=STOCKS.find(function(x){return x.id===AS;});
  var C=st.c;
  document.getElementById("rpanel").innerHTML=
    '<div style="text-align:center;padding-top:50px">'
      +'<div class="ldots"><div class="ldot" style="background:'+C+'"></div><div class="ldot" style="background:'+C+'"></div><div class="ldot" style="background:'+C+'"></div></div>'
      +'<div style="margin-top:14px;font-size:14px;color:'+C+'">AI 即時分析中⋯</div>'
      +'<div style="margin-top:6px;font-size:11px;color:#3a5070">依據 '+UDATE+' 收盤資料</div>'
    +'</div>';
  var b=BASE[AS];
  var c=cur(AS),p=prv(AS);
  var ch=c&&p?pct(c,p):"0";
  var today=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"});
  var latestNews=LATEST_NEWS[AS]||"";
  var prompt="你是ESL產業股票分析師。今天是 "+today+"。\n\n以下是最新市場資訊：\n"+latestNews+"\n\n請根據以上最新資訊，撰寫 "+st.name+"（"+st.ticker+"）今日收盤分析報告。\n\n股價數據：\n- 收盤："+st.cur+" "+(c?c.toLocaleString():"未上市")+"\n- 漲跌："+(parseFloat(ch)>=0?"+":"")+ch+"%\n- YTD："+b.ytd+"%\n- 52週高："+h52(AS)+"，低："+l52(AS)+"\n- 目標價："+(tgt(AS)||"無")+"，評級："+rat(AS)+"\n\n請依格式撰寫，每段 emoji 標題，300字內，純文字：\n📊 市場摘要（引用最新資訊）\n🔍 ESL 產業背景\n⚡ 技術面信號\n💡 交易洞察";

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  }).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(function(j){
    var txt=(j.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n").trim();
    if(!txt) throw new Error("no content");
    document.getElementById("rpanel").innerHTML=
      '<div class="rhead"><div><span class="rsn" style="color:'+C+'">'+st.name+'</span><span class="rss">AI 即時分析</span></div><button class="cbtn" onclick="renderReport()">✕</button></div>'
      +'<div class="rbody">🔍 已整合最新資訊（'+today+'）\n\n'+txt+'</div>'
      +'<div class="rftr">以上內容僅供參考，不構成投資建議</div>';
  }).catch(function(err){
    document.getElementById("rpanel").innerHTML=
      '<div class="rhead"><div><span class="rsn" style="color:'+C+'">'+st.name+'</span><span class="rss">最新新聞</span></div><button class="cbtn" onclick="renderReport()">✕</button></div>'
      +'<div class="rbody">⚠️ AI 連線失敗，以下為最新搜尋摘要：\n\n'+latestNews+'</div>'
      +'<div class="rftr">以上內容僅供參考，不構成投資建議</div>';
  });
}

function renderNews(){
  var st=STOCKS.find(function(x){return x.id===AS;});
  var C=st.c;
  var nd=NEWS_DATA[AS];
  var finHTML=nd.fin.map(function(f){
    return '<div class="fitem"><div class="fk">'+f.k+'</div><div class="fv">'+f.v+'</div></div>';
  }).join('');
  var newsHTML=nd.news.map(function(n,i){
    var last=i===nd.news.length-1;
    return '<div class="nitem"'+(last?' style="border-bottom:none;margin-bottom:0;padding-bottom:0"':'')+'>'+
      '<div style="display:flex;align-items:center;margin-bottom:4px">'+
        '<span class="ntag" style="background:'+n.tc+'20;color:'+n.tc+'">'+n.tag+'</span>'+
        '<span class="ndate">'+n.date+'</span>'+
      '</div>'+
      '<div class="ntitle">'+n.title+'</div>'+
      '<div class="nbody">'+n.body+'</div>'+
    '</div>';
  }).join('');
  var patHTML=nd.patents.map(function(p,i){
    var last=i===nd.patents.length-1;
    return '<div class="pitem"'+(last?' style="border-bottom:none;margin-bottom:0;padding-bottom:0"':'')+'>'+
      '<div class="pdot" style="background:'+C+'"></div>'+
      '<div><div class="ptitle">'+p.title+'</div><div class="pdesc">'+p.desc+'</div></div>'+
    '</div>';
  }).join('');

  document.getElementById("tnews").innerHTML=
    '<div class="nbox" style="border-color:'+C+'44">'
      +'<div class="nhead"><div class="ntit" style="color:'+C+'">📊 財報摘要</div><div class="ner">法說會：'+nd.nextER+'</div></div>'
      +'<div class="fgrid">'+finHTML+'</div>'
      +'<div class="fupd">資料更新：'+nd.updated+'</div>'
    +'</div>'
    +'<div class="nbox">'
      +'<div class="ntit" style="color:'+C+';margin-bottom:10px">📰 重大新聞</div>'
      +newsHTML
    +'</div>'
    +'<div class="nbox">'
      +'<div class="ntit" style="color:'+C+';margin-bottom:10px">🔬 技術專利重點</div>'
      +patHTML
    +'</div>';
}
